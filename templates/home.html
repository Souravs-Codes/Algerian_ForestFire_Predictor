<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 450px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Forest Fire Prediction</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <input type="number" step="any" name="Temperature" placeholder="Temperature" required>

        <input type="number" step="any" name="RH" placeholder="RH" required>

        <input type="number" step="any" name="Ws" placeholder="Wind Speed (Ws)" required>

        <input type="number" step="any" name="Rain" placeholder="Rain" required>

        <input type="number" step="any" name="FFMC" placeholder="FFMC" required>

        <input type="number" step="any" name="DMC" placeholder="DMC" required>

        <input type="number" step="any" name="ISI" placeholder="ISI" required>

        <input type="number" step="any" name="Classes" placeholder="Classes" required>

        <input type="number" step="any" name="Region" placeholder="Region" required>

        <button type="submit">Predict</button>

    </form>

    {% if results %}
    <div class="result">
        Prediction: {{ results }}
    </div>
    {% endif %}
</div>

</body>
</html>
