```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background:
            linear-gradient(rgba(0,0,0,0.65),
            rgba(0,0,0,0.75)),
            url("https://images.unsplash.com/photo-1473773508845-188df298d2d1?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:700px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            border-radius:25px;
            padding:40px;
            color:white;
            box-shadow:0 15px 40px rgba(0,0,0,0.4);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h1{
            font-size:2.5rem;
            margin-bottom:10px;
        }

        .title span{
            color:#ff6b35;
        }

        .title p{
            color:#ddd;
        }

        form{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,0.1);
            color:white;
            outline:none;
            font-size:15px;
        }

        input::placeholder{
            color:#d0d0d0;
        }

        .full-width{
            grid-column:1/3;
        }

        button{
            grid-column:1/3;
            padding:15px;
            border:none;
            border-radius:50px;
            background:#ff6b35;
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0px 10px 25px rgba(255,107,53,0.5);
        }

        .result{
            margin-top:25px;
            text-align:center;
            padding:20px;
            border-radius:15px;
            background:rgba(255,255,255,0.1);
        }

        .result h2{
            color:#ff6b35;
            margin-bottom:10px;
        }

        .prediction{
            font-size:2rem;
            font-weight:700;
            color:#4dff91;
        }

        .back-btn{
            display:inline-block;
            text-decoration:none;
            color:white;
            margin-bottom:25px;
            font-size:14px;
        }

        @media(max-width:768px){

            form{
                grid-template-columns:1fr;
            }

            button,
            .full-width{
                grid-column:auto;
            }

            .title h1{
                font-size:2rem;
            }
        }

    </style>
</head>
<body>

<div class="container">

    <a href="/" class="back-btn">← Back to Home</a>

    <div class="title">
        <h1>🔥 Forest Fire <span>Prediction</span></h1>
        <p>Enter environmental parameters to estimate Fire Weather Index (FWI)</p>
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <input type="number" step="any" name="Temperature" placeholder="🌡 Temperature" required>

        <input type="number" step="any" name="RH" placeholder="💧 Relative Humidity (RH)" required>

        <input type="number" step="any" name="Ws" placeholder="🌬 Wind Speed" required>

        <input type="number" step="any" name="Rain" placeholder="🌧 Rainfall" required>

        <input type="number" step="any" name="FFMC" placeholder="🔥 FFMC" required>

        <input type="number" step="any" name="DMC" placeholder="📊 DMC" required>

        <input type="number" step="any" name="ISI" placeholder="📈 ISI" required>

        <input type="number" step="any" name="Classes" placeholder="🏷 Class" required>

        <input type="number" step="any" name="Region" placeholder="🌍 Region" required class="full-width">

        <button type="submit">
            Predict Fire Weather Index
        </button>

    </form>

    {% if results %}
    <div class="result">
        <h2>Prediction Result</h2>
        <div class="prediction">
            {{ results }}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
```
